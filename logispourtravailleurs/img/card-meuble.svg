<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#E0D8CC"/>
  <!-- Wall -->
  <rect width="400" height="195" fill="#D8D0C4"/>
  <!-- Floor -->
  <rect x="0" y="195" width="400" height="55" fill="#B89068"/>
  <line x1="0" y1="210" x2="400" y2="210" stroke="#9A7850" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="195" x2="100" y2="250" stroke="#9A7850" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="195" x2="260" y2="250" stroke="#9A7850" stroke-width="1" opacity="0.3"/>
  <!-- TV unit/console -->
  <rect x="100" y="130" width="200" height="12" rx="3" fill="#5C4A35"/>
  <rect x="130" y="142" width="140" height="55" rx="4" fill="#4A3828"/>
  <!-- TV screen -->
  <rect x="140" y="148" width="120" height="44" rx="3" fill="#1A2830"/>
  <rect x="140" y="148" width="120" height="44" rx="3" fill="none" stroke="#2A3840" stroke-width="1.5"/>
  <!-- TV stand legs -->
  <rect x="148" y="196" width="8" height="14" rx="2" fill="#3A2E22"/>
  <rect x="240" y="196" width="8" height="14" rx="2" fill="#3A2E22"/>
  <!-- Sofa -->
  <rect x="20" y="148" width="100" height="58" rx="10" fill="#8B9E7A"/>
  <rect x="20" y="138" width="100" height="20" rx="7" fill="#7A8E6A"/>
  <rect x="10" y="145" width="18" height="50" rx="6" fill="#7A8E6A"/>
  <rect x="110" y="145" width="18" height="50" rx="6" fill="#7A8E6A"/>
  <!-- Sofa cushions small -->
  <rect x="28" y="148" width="40" height="40" rx="7" fill="#96AA84"/>
  <rect x="75" y="148" width="40" height="40" rx="7" fill="#96AA84"/>
  <!-- Sofa legs -->
  <rect x="22" y="198" width="8" height="12" rx="2" fill="#4A3828"/>
  <rect x="104" y="198" width="8" height="12" rx="2" fill="#4A3828"/>
  <!-- Armchair right -->
  <rect x="280" y="152" width="100" height="54" rx="10" fill="#C47858"/>
  <rect x="280" y="140" width="100" height="20" rx="7" fill="#B06848"/>
  <rect x="270" y="148" width="18" height="46" rx="6" fill="#B06848"/>
  <rect x="372" y="148" width="18" height="46" rx="6" fill="#B06848"/>
  <rect x="286" y="152" width="88" height="40" rx="8" fill="#CE8868"/>
  <rect x="282" y="198" width="8" height="12" rx="2" fill="#4A3828"/>
  <rect x="364" y="198" width="8" height="12" rx="2" fill="#4A3828"/>
  <!-- Coffee table -->
  <rect x="148" y="190" width="100" height="8" rx="3" fill="#6B5240"/>
  <rect x="158" y="198" width="6" height="20" rx="2" fill="#5A4232"/>
  <rect x="228" y="198" width="6" height="20" rx="2" fill="#5A4232"/>
  <!-- Plant -->
  <rect x="50" y="80" width="14" height="55" rx="3" fill="#7A6248"/>
  <ellipse cx="38" cy="62" rx="24" ry="28" fill="#5A8A46"/>
  <ellipse cx="58" cy="55" rx="20" ry="24" fill="#4E7A3C"/>
  <ellipse cx="44" cy="52" rx="16" ry="20" fill="#6A9A54"/>
  <!-- Throw pillow on sofa -->
  <rect x="52" y="140" width="28" height="28" rx="5" fill="#E8602A" opacity="0.85"/>
  <!-- Wall art -->
  <rect x="170" y="30" width="100" height="70" rx="5" fill="#F0EAE0"/>
  <rect x="170" y="30" width="100" height="70" rx="5" fill="none" stroke="#C8B898" stroke-width="2.5"/>
  <rect x="180" y="40" width="80" height="50" rx="3" fill="#C4D4C0" opacity="0.8"/>
  <ellipse cx="220" cy="65" rx="25" ry="18" fill="#8B9E7A" opacity="0.6"/>
</svg>