<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="wall-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCC4B8"/>
      <stop offset="60%" stop-color="#D8D0C4"/>
      <stop offset="100%" stop-color="#E8E0D4"/>
    </linearGradient>
    <linearGradient id="floor-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#987248"/>
    </linearGradient>
    <linearGradient id="win-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AAEC8"/>
      <stop offset="100%" stop-color="#B8D4CC"/>
    </linearGradient>
    <linearGradient id="sky-art" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4E7A9C"/>
      <stop offset="50%" stop-color="#8AB4CA"/>
      <stop offset="100%" stop-color="#C0D8E0"/>
    </linearGradient>
    <clipPath id="art-clip">
      <rect x="104" y="60" width="176" height="126" rx="3"/>
    </clipPath>
  </defs>

  <!-- Wall with gradient -->
  <rect width="800" height="600" fill="url(#wall-l)"/>
  <!-- Subtle dado rail line -->
  <line x1="0" y1="290" x2="800" y2="290" stroke="#C0B8AC" stroke-width="1.5" opacity="0.35"/>

  <!-- Baseboard molding (wall-floor junction) -->
  <rect x="0" y="452" width="800" height="8" fill="#C8C0B0" opacity="0.5"/>
  <rect x="0" y="458" width="800" height="2" fill="#B0A898" opacity="0.3"/>
  <!-- Floor -->
  <rect x="0" y="460" width="800" height="140" fill="url(#floor-l)"/>
  <!-- Floor planks -->
  <line x1="0" y1="475" x2="800" y2="475" stroke="#987248" stroke-width="1.5" opacity="0.42"/>
  <line x1="0" y1="492" x2="800" y2="492" stroke="#987248" stroke-width="1.5" opacity="0.36"/>
  <line x1="0" y1="510" x2="800" y2="510" stroke="#987248" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="530" x2="800" y2="530" stroke="#987248" stroke-width="1.2" opacity="0.25"/>
  <!-- Plank vertical joints -->
  <line x1="150" y1="460" x2="150" y2="600" stroke="#987248" stroke-width="1" opacity="0.26"/>
  <line x1="350" y1="460" x2="350" y2="600" stroke="#987248" stroke-width="1" opacity="0.26"/>
  <line x1="550" y1="460" x2="550" y2="600" stroke="#987248" stroke-width="1" opacity="0.26"/>
  <line x1="720" y1="460" x2="720" y2="600" stroke="#987248" stroke-width="1" opacity="0.26"/>

  <!-- Window with sky gradient -->
  <rect x="554" y="36" width="210" height="310" rx="4" fill="url(#win-l)"/>
  <rect x="554" y="36" width="210" height="310" fill="none" stroke="#9A8A72" stroke-width="5" rx="4"/>
  <line x1="659" y1="36" x2="659" y2="346" stroke="#9A8A72" stroke-width="3.5"/>
  <line x1="554" y1="191" x2="764" y2="191" stroke="#9A8A72" stroke-width="3.5"/>
  <!-- Window reflection -->
  <line x1="562" y1="44" x2="584" y2="76" stroke="white" stroke-width="3" opacity="0.26" stroke-linecap="round"/>
  <!-- Window sill -->
  <rect x="548" y="342" width="222" height="10" rx="3" fill="#C8B898"/>
  <!-- Window light on floor -->
  <path d="M554 460 L764 460 L800 600 L500 600 Z" fill="#F0E8C0" opacity="0.06"/>

  <!-- Sofa shadow on floor -->
  <ellipse cx="310" cy="474" rx="240" ry="12" fill="#1E3A2F" opacity="0.16"/>

  <!-- Sofa base (brand --green-dark) -->
  <rect x="74" y="316" width="474" height="156" rx="16" fill="#1E3A2F"/>
  <!-- Front apron zone (slightly lighter to read as a separate panel) -->
  <rect x="90" y="422" width="456" height="44" rx="0" fill="#243F34" opacity="0.55"/>
  <!-- Sofa back panel (deep, darker than base) -->
  <rect x="74" y="274" width="474" height="60" rx="12" fill="#152820"/>
  <!-- Sofa back cushions (brand --green-mid) -->
  <rect x="86" y="276" width="142" height="56" rx="9" fill="#2D5543"/>
  <rect x="240" y="276" width="142" height="56" rx="9" fill="#2D5543"/>
  <rect x="394" y="276" width="134" height="56" rx="9" fill="#2D5543"/>
  <!-- Back cushion piping seams -->
  <rect x="86" y="276" width="142" height="56" rx="9" fill="none" stroke="#14281E" stroke-width="1.5" opacity="0.45"/>
  <rect x="240" y="276" width="142" height="56" rx="9" fill="none" stroke="#14281E" stroke-width="1.5" opacity="0.45"/>
  <rect x="394" y="276" width="134" height="56" rx="9" fill="none" stroke="#14281E" stroke-width="1.5" opacity="0.45"/>
  <!-- Back cushion top highlights (puffiness) -->
  <rect x="86" y="276" width="142" height="20" rx="9" fill="#3A6A52" opacity="0.32"/>
  <rect x="240" y="276" width="142" height="20" rx="9" fill="#3A6A52" opacity="0.32"/>
  <rect x="394" y="276" width="134" height="20" rx="9" fill="#3A6A52" opacity="0.32"/>
  <!-- Back cushion dimples -->
  <circle cx="157" cy="304" r="3" fill="#0C1E16" opacity="0.6"/>
  <circle cx="311" cy="304" r="3" fill="#0C1E16" opacity="0.6"/>
  <circle cx="461" cy="304" r="3" fill="#0C1E16" opacity="0.6"/>
  <!-- Sofa arms (deep, same as back panel) -->
  <rect x="54" y="285" width="30" height="137" rx="8" fill="#152820"/>
  <!-- Arm top surface (rolled-arm highlight, taller) -->
  <rect x="54" y="285" width="30" height="14" rx="6" fill="#3A6A52" opacity="0.58"/>
  <rect x="518" y="285" width="30" height="137" rx="8" fill="#152820"/>
  <rect x="518" y="285" width="30" height="14" rx="6" fill="#3A6A52" opacity="0.58"/>
  <!-- Sofa seat cushions (brand --green-mid) -->
  <rect x="90" y="314" width="144" height="106" rx="10" fill="#2D5543"/>
  <rect x="244" y="314" width="144" height="106" rx="10" fill="#2D5543"/>
  <rect x="398" y="314" width="136" height="106" rx="10" fill="#2D5543"/>
  <!-- Seat cushion piping seams -->
  <rect x="90" y="314" width="144" height="106" rx="10" fill="none" stroke="#14281E" stroke-width="1.5" opacity="0.45"/>
  <rect x="244" y="314" width="144" height="106" rx="10" fill="none" stroke="#14281E" stroke-width="1.5" opacity="0.45"/>
  <rect x="398" y="314" width="136" height="106" rx="10" fill="none" stroke="#14281E" stroke-width="1.5" opacity="0.45"/>
  <!-- Seat cushion top highlights (puffiness) -->
  <rect x="90" y="314" width="144" height="36" rx="10" fill="#3A6A52" opacity="0.32"/>
  <rect x="244" y="314" width="144" height="36" rx="10" fill="#3A6A52" opacity="0.32"/>
  <rect x="398" y="314" width="136" height="36" rx="10" fill="#3A6A52" opacity="0.32"/>
  <!-- Seat cushion front face (depth strip) -->
  <rect x="90" y="414" width="144" height="6" rx="0" fill="#091410" opacity="0.5"/>
  <rect x="244" y="414" width="144" height="6" rx="0" fill="#091410" opacity="0.5"/>
  <rect x="398" y="414" width="136" height="6" rx="0" fill="#091410" opacity="0.5"/>
  <!-- Seat cushion dimples -->
  <circle cx="162" cy="355" r="4" fill="#0C1E16" opacity="0.6"/>
  <circle cx="316" cy="355" r="4" fill="#0C1E16" opacity="0.6"/>
  <circle cx="466" cy="355" r="4" fill="#0C1E16" opacity="0.6"/>
  <!-- Sofa legs (walnut brown) -->
  <rect x="88" y="458" width="14" height="22" rx="3" fill="#5A4A35"/>
  <rect x="256" y="458" width="14" height="22" rx="3" fill="#5A4A35"/>
  <rect x="484" y="458" width="14" height="22" rx="3" fill="#5A4A35"/>

  <!-- Throw pillow on sofa -->
  <rect x="302" y="277" width="66" height="66" rx="9" fill="#E8602A" opacity="0.86"/>
  <line x1="302" y1="310" x2="368" y2="310" stroke="#C84A1A" stroke-width="1.5" opacity="0.28"/>
  <line x1="335" y1="277" x2="335" y2="343" stroke="#C84A1A" stroke-width="1.5" opacity="0.28"/>

  <!-- Coffee table -->
  <rect x="172" y="428" width="300" height="22" rx="5" fill="#5C4A35"/>
  <!-- Table top highlight -->
  <rect x="172" y="428" width="300" height="5" rx="2" fill="#8A6A50" opacity="0.35"/>
  <!-- Table front face (depth) -->
  <rect x="172" y="446" width="300" height="4" rx="0" fill="#3A2818" opacity="0.32"/>
  <!-- Legs -->
  <rect x="196" y="450" width="12" height="26" rx="3" fill="#4A3828"/>
  <rect x="440" y="450" width="12" height="26" rx="3" fill="#4A3828"/>
  <!-- Cross stretcher between legs -->
  <rect x="202" y="462" width="244" height="5" rx="2" fill="#4A3828" opacity="0.55"/>
  <!-- Items on coffee table -->
  <rect x="200" y="420" width="62" height="9" rx="2" fill="#C8B898"/>
  <rect x="202" y="412" width="58" height="9" rx="2" fill="#B8A888"/>
  <rect x="308" y="414" width="20" height="15" rx="3" fill="#D4C8B8"/>
  <rect x="306" y="410" width="24" height="6" rx="2" fill="#C8B898"/>

  <!-- Rug under coffee table -->
  <ellipse cx="322" cy="470" rx="210" ry="30" fill="#C47858" opacity="0.38"/>
  <ellipse cx="322" cy="470" rx="196" ry="26" fill="none" stroke="#B06848" stroke-width="2.5" opacity="0.3"/>
  <ellipse cx="322" cy="470" rx="180" ry="21" fill="none" stroke="#D48870" stroke-width="1" opacity="0.18"/>

  <!-- Large plant (right) — leaf paths for tropical feel -->
  <!-- Stem above pot -->
  <rect x="697" y="358" width="6" height="56" rx="2" fill="#5A4A2E"/>
  <!-- Pot body (tapered ceramic — wider at rim, narrower at base) -->
  <path d="M678 460 L671 414 L729 414 L722 460 Z" fill="#8B7A5A"/>
  <!-- Pot left-face highlight -->
  <path d="M678 460 L671 414 L683 414 L690 460 Z" fill="#A89A72" opacity="0.38"/>
  <!-- Pot rim (top lip, slightly wider) -->
  <rect x="666" y="407" width="68" height="10" rx="4" fill="#9A8A6A"/>
  <!-- Rim top highlight -->
  <rect x="666" y="407" width="68" height="4" rx="4" fill="#BAA882" opacity="0.38"/>
  <!-- Soil surface -->
  <ellipse cx="700" cy="413" rx="26" ry="5" fill="#3A2E18" opacity="0.82"/>
  <!-- Saucer -->
  <ellipse cx="700" cy="463" rx="46" ry="7" fill="#A89878"/>
  <ellipse cx="700" cy="463" rx="46" ry="7" fill="none" stroke="#8A7A58" stroke-width="1.5"/>
  <!-- Saucer inner ring -->
  <ellipse cx="700" cy="462" rx="38" ry="5" fill="none" stroke="#9A8A68" stroke-width="1" opacity="0.45"/>
  <!-- Leaves (3 directional, layered) -->
  <path d="M700 360 Q668 320 672 278 Q690 306 700 262 Q710 306 730 280 Q726 324 700 360Z" fill="#4E7A3C"/>
  <path d="M700 346 Q672 308 678 270 Q694 296 700 254 Q706 296 720 272 Q720 312 700 346Z" fill="#5A8A46" opacity="0.85"/>
  <path d="M700 330 Q678 296 682 260 Q694 284 700 244 Q706 284 718 262 Q716 298 700 330Z" fill="#3E6A2E" opacity="0.78"/>
  <!-- Side stems for fullness -->
  <path d="M698 305 Q658 284 636 262 Q658 270 666 254 Q672 272 698 305Z" fill="#4E7A3C" opacity="0.72"/>
  <path d="M702 292 Q742 272 762 252 Q740 260 732 246 Q730 264 702 292Z" fill="#5A8A46" opacity="0.68"/>

  <!-- Nature landscape painting (framed, upper left) -->
  <rect x="96" y="52" width="192" height="142" rx="6" fill="#F0EAE0"/>
  <rect x="96" y="52" width="192" height="142" fill="none" stroke="#C8B898" stroke-width="3" rx="6"/>
  <g clip-path="url(#art-clip)">
    <rect x="104" y="60" width="176" height="126" fill="url(#sky-art)"/>
    <!-- Sun disc -->
    <circle cx="254" cy="78" r="14" fill="#F8E070" opacity="0.7"/>
    <!-- Distant mountains (pale blue-grey) -->
    <polygon points="104,130 132,90 158,110 180,80 206,100 230,82 258,102 280,86 280,132 104,132" fill="#9EB8CA" opacity="0.6"/>
    <!-- Mid mountains (sage green) -->
    <polygon points="104,146 122,112 144,128 164,104 186,120 208,108 232,122 256,106 280,116 280,148 104,148" fill="#6A8A6A"/>
    <!-- Rolling hills -->
    <path d="M104 158 Q128 142 154 150 Q176 140 200 148 Q224 139 248 147 Q264 140 280 148 L280 162 L104 162 Z" fill="#7A9A5C"/>
    <!-- Forest floor -->
    <rect x="104" y="158" width="176" height="28" fill="#3A5A2E"/>
    <!-- Pine trees — left cluster -->
    <polygon points="112,158 108,140 116,140" fill="#2A4428"/>
    <polygon points="122,158 117,137 127,137" fill="#243C24"/>
    <polygon points="133,158 129,144 137,144" fill="#344E30"/>
    <!-- Pine trees — right cluster -->
    <polygon points="250,158 246,142 254,142" fill="#2A4428"/>
    <polygon points="261,158 257,140 265,140" fill="#243C24"/>
    <polygon points="272,158 268,144 276,144" fill="#344E30"/>
    <!-- Lone tree — centre -->
    <polygon points="194,158 190,148 198,148" fill="#2A4428"/>
  </g>

  <!-- Side table (left of sofa) -->
  <!-- Table top -->
  <rect x="8" y="374" width="62" height="11" rx="4" fill="#7A6248"/>
  <!-- Top surface gloss -->
  <rect x="8" y="374" width="62" height="4" rx="4" fill="#9A8060" opacity="0.3"/>
  <!-- Table top front face depth -->
  <rect x="8" y="382" width="62" height="4" rx="0" fill="#5A4230" opacity="0.28"/>
  <!-- Two legs -->
  <rect x="12" y="385" width="10" height="78" rx="3" fill="#6B5240"/>
  <rect x="58" y="385" width="10" height="78" rx="3" fill="#6B5240"/>
  <!-- Leg right-face shadow strips -->
  <rect x="20" y="385" width="2" height="78" rx="1" fill="#3A2818" opacity="0.18"/>
  <rect x="66" y="385" width="2" height="78" rx="1" fill="#3A2818" opacity="0.18"/>
  <!-- Stretcher rail connecting legs -->
  <rect x="14" y="438" width="50" height="5" rx="2" fill="#6B5240" opacity="0.7"/>
  <!-- Vase/candle on table top -->
  <rect x="25" y="356" width="16" height="18" rx="4" fill="#D4C8B8"/>
  <rect x="23" y="352" width="20" height="6" rx="3" fill="#C8B898"/>
  <!-- Vase highlight -->
  <rect x="27" y="357" width="5" height="12" rx="2" fill="white" opacity="0.2"/>
</svg>
