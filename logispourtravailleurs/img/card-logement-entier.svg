<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="sky-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BAAB8"/>
      <stop offset="100%" stop-color="#C8DDD8"/>
    </linearGradient>
    <linearGradient id="grass-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AA878"/>
      <stop offset="100%" stop-color="#6E8A5E"/>
    </linearGradient>
    <linearGradient id="facade-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAE0D0"/>
      <stop offset="100%" stop-color="#D8CEC0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="180" fill="url(#sky-g)"/>
  <!-- Ground -->
  <rect x="0" y="178" width="400" height="72" fill="url(#grass-g)"/>
  <rect x="0" y="178" width="400" height="5" fill="#78966A"/>
  <!-- Ground shadow under house -->
  <ellipse cx="200" cy="197" rx="116" ry="8" fill="#1E3A2F" opacity="0.1"/>

  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="40" ry="16" fill="white" opacity="0.82"/>
  <ellipse cx="108" cy="42" rx="28" ry="14" fill="white" opacity="0.82"/>
  <ellipse cx="55" cy="48" rx="24" ry="12" fill="white" opacity="0.82"/>
  <ellipse cx="298" cy="60" rx="34" ry="14" fill="white" opacity="0.65"/>
  <ellipse cx="325" cy="52" rx="24" ry="11" fill="white" opacity="0.65"/>
  <ellipse cx="276" cy="58" rx="18" ry="10" fill="white" opacity="0.65"/>

  <!-- House wall -->
  <rect x="98" y="108" width="204" height="122" fill="url(#facade-g)"/>
  <!-- Subtle right-face shadow -->
  <rect x="278" y="108" width="24" height="122" fill="#4A3828" opacity="0.07"/>

  <!-- Roof -->
  <polygon points="76,114 200,27 324,114" fill="#5C4A35"/>
  <!-- Roof left-face shadow strip -->
  <polygon points="76,114 200,27 200,33 80,118 Z" fill="#3A2A18" opacity="0.2"/>
  <!-- Roof highlight edges -->
  <polyline points="76,114 200,27 324,114" fill="none" stroke="#7A6050" stroke-width="1.5" opacity="0.3"/>

  <!-- Chimney -->
  <rect x="238" y="46" width="22" height="48" fill="#6B5240"/>
  <rect x="234" y="42" width="30" height="7" rx="2" fill="#5A4232"/>
  <!-- Chimney smoke -->
  <path d="M248 38 Q242 28 248 20 Q254 12 248 4" stroke="#B8B0A8" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M254 36 Q260 26 254 18" stroke="#B8B0A8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Door -->
  <rect x="168" y="165" width="52" height="65" rx="3" fill="#5C4A35"/>
  <rect x="173" y="172" width="18" height="22" rx="2" fill="#4A3828" opacity="0.35"/>
  <rect x="197" y="172" width="18" height="22" rx="2" fill="#4A3828" opacity="0.35"/>
  <rect x="173" y="198" width="18" height="20" rx="2" fill="#4A3828" opacity="0.35"/>
  <rect x="197" y="198" width="18" height="20" rx="2" fill="#4A3828" opacity="0.35"/>
  <circle cx="213" cy="202" r="4" fill="#C8A870"/>
  <circle cx="213" cy="202" r="2" fill="#D8B880"/>

  <!-- Left window -->
  <rect x="110" y="135" width="52" height="48" rx="3" fill="#A8C4B8"/>
  <rect x="110" y="135" width="52" height="48" fill="none" stroke="#8A7A60" stroke-width="2" rx="3"/>
  <line x1="136" y1="135" x2="136" y2="183" stroke="#8A7A60" stroke-width="1.5"/>
  <line x1="110" y1="159" x2="162" y2="159" stroke="#8A7A60" stroke-width="1.5"/>
  <line x1="115" y1="139" x2="126" y2="153" stroke="white" stroke-width="2" opacity="0.38" stroke-linecap="round"/>
  <!-- Window sill -->
  <rect x="106" y="181" width="60" height="5" rx="2" fill="#C8B898"/>

  <!-- Right window -->
  <rect x="238" y="135" width="52" height="48" rx="3" fill="#A8C4B8"/>
  <rect x="238" y="135" width="52" height="48" fill="none" stroke="#8A7A60" stroke-width="2" rx="3"/>
  <line x1="264" y1="135" x2="264" y2="183" stroke="#8A7A60" stroke-width="1.5"/>
  <line x1="238" y1="159" x2="290" y2="159" stroke="#8A7A60" stroke-width="1.5"/>
  <line x1="243" y1="139" x2="254" y2="153" stroke="white" stroke-width="2" opacity="0.38" stroke-linecap="round"/>
  <rect x="234" y="181" width="60" height="5" rx="2" fill="#C8B898"/>

  <!-- Walkway -->
  <path d="M186 230 L176 250 L224 250 L214 230 Z" fill="#C8B898"/>
  <line x1="200" y1="230" x2="200" y2="250" stroke="#B8A888" stroke-width="1" opacity="0.4"/>

  <!-- Bushes left -->
  <ellipse cx="118" cy="230" rx="28" ry="18" fill="#6A8A54"/>
  <ellipse cx="100" cy="235" rx="18" ry="13" fill="#5A7A46"/>
  <!-- Bushes right -->
  <ellipse cx="282" cy="230" rx="28" ry="18" fill="#6A8A54"/>
  <ellipse cx="300" cy="235" rx="18" ry="13" fill="#5A7A46"/>

  <!-- Tree (right) — layered for depth -->
  <rect x="344" y="148" width="8" height="80" rx="2" fill="#5A4A35"/>
  <ellipse cx="348" cy="140" rx="26" ry="32" fill="#3E6A2E"/>
  <ellipse cx="348" cy="122" rx="22" ry="26" fill="#4E7A3C"/>
  <ellipse cx="348" cy="108" rx="16" ry="20" fill="#5A8A46"/>
</svg>
