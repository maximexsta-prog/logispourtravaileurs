<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Sky/wall warm background -->
  <rect width="1200" height="600" fill="#C8B89A"/>
  <!-- Back wall -->
  <rect x="0" y="0" width="1200" height="420" fill="#D4C4A8"/>
  <!-- Floor -->
  <rect x="0" y="420" width="1200" height="180" fill="#A0845C"/>
  <!-- Floor planks -->
  <line x1="0" y1="440" x2="1200" y2="440" stroke="#8B7048" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#8B7048" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#8B7048" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#8B7048" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#8B7048" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="420" x2="200" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="420" x2="500" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="420" x2="800" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.3"/>
  <line x1="1050" y1="420" x2="1050" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.3"/>
  <!-- Window left -->
  <rect x="80" y="60" width="200" height="280" fill="#A8C4B8" rx="4"/>
  <rect x="80" y="60" width="200" height="280" fill="none" stroke="#8A7A60" stroke-width="6" rx="4"/>
  <line x1="180" y1="60" x2="180" y2="340" stroke="#8A7A60" stroke-width="4"/>
  <line x1="80" y1="200" x2="280" y2="200" stroke="#8A7A60" stroke-width="4"/>
  <!-- Window light glow -->
  <rect x="80" y="60" width="200" height="280" fill="#E8D4A0" opacity="0.3" rx="4"/>
  <!-- Curtain left -->
  <path d="M60 50 Q80 150 70 340 L80 340 L80 60 Z" fill="#8B9E7A" opacity="0.8"/>
  <path d="M280 50 Q260 150 270 340 L280 340 L280 60 Z" fill="#8B9E7A" opacity="0.8"/>
  <!-- Bed -->
  <rect x="350" y="280" width="480" height="160" rx="8" fill="#E8DDD0"/>
  <!-- Bed headboard -->
  <rect x="340" y="220" width="500" height="80" rx="10" fill="#5C4A35"/>
  <!-- Pillow 1 -->
  <rect x="370" y="270" width="180" height="80" rx="12" fill="#F5F0E8"/>
  <rect x="370" y="270" width="180" height="80" rx="12" fill="none" stroke="#D4C8B8" stroke-width="1.5"/>
  <!-- Pillow 2 -->
  <rect x="570" y="270" width="180" height="80" rx="12" fill="#F5F0E8"/>
  <rect x="570" y="270" width="180" height="80" rx="12" fill="none" stroke="#D4C8B8" stroke-width="1.5"/>
  <!-- Duvet -->
  <rect x="350" y="330" width="480" height="110" rx="8" fill="#EAE0D0"/>
  <line x1="350" y1="355" x2="830" y2="355" stroke="#D4C8B8" stroke-width="1.5" opacity="0.6"/>
  <line x1="350" y1="375" x2="830" y2="375" stroke="#D4C8B8" stroke-width="1.5" opacity="0.4"/>
  <!-- Bed legs -->
  <rect x="360" y="430" width="16" height="30" rx="4" fill="#4A3828"/>
  <rect x="800" y="430" width="16" height="30" rx="4" fill="#4A3828"/>
  <!-- Nightstand left -->
  <rect x="260" y="340" width="80" height="90" rx="6" fill="#6B5240"/>
  <rect x="270" y="355" width="60" height="35" rx="4" fill="#5A4232"/>
  <!-- Lamp on nightstand -->
  <rect x="290" y="310" width="4" height="35" fill="#8A7A60"/>
  <ellipse cx="292" cy="310" rx="22" ry="14" fill="#F0E0B0" opacity="0.9"/>
  <ellipse cx="292" cy="310" rx="22" ry="14" fill="none" stroke="#C8A870" stroke-width="1.5"/>
  <!-- Nightstand right -->
  <rect x="840" y="340" width="80" height="90" rx="6" fill="#6B5240"/>
  <rect x="850" y="355" width="60" height="35" rx="4" fill="#5A4232"/>
  <!-- Plant right -->
  <rect x="900" y="290" width="20" height="60" rx="4" fill="#6B5240"/>
  <ellipse cx="870" cy="270" rx="28" ry="32" fill="#5A7A48"/>
  <ellipse cx="895" cy="260" rx="22" ry="26" fill="#4E6E3E"/>
  <ellipse cx="858" cy="258" rx="18" ry="22" fill="#6A8A54"/>
  <!-- Window right -->
  <rect x="920" y="60" width="200" height="280" fill="#A8C4B8" rx="4"/>
  <rect x="920" y="60" width="200" height="280" fill="none" stroke="#8A7A60" stroke-width="6" rx="4"/>
  <line x1="1020" y1="60" x2="1020" y2="340" stroke="#8A7A60" stroke-width="4"/>
  <line x1="920" y1="200" x2="1120" y2="200" stroke="#8A7A60" stroke-width="4"/>
  <rect x="920" y="60" width="200" height="280" fill="#E8D4A0" opacity="0.25" rx="4"/>
  <path d="M900 50 Q920 150 910 340 L920 340 L920 60 Z" fill="#8B9E7A" opacity="0.8"/>
  <path d="M1120 50 Q1100 150 1110 340 L1120 340 L1120 60 Z" fill="#8B9E7A" opacity="0.8"/>
  <!-- Rug -->
  <ellipse cx="600" cy="445" rx="240" ry="40" fill="#C4786A" opacity="0.5"/>
  <ellipse cx="600" cy="445" rx="220" ry="34" fill="none" stroke="#B06858" stroke-width="2" opacity="0.4"/>
  <!-- Subtle vignette overlay -->
  <rect width="1200" height="600" fill="url(#vignette)" opacity="0.35"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1E3A2F"/>
    </radialGradient>
  </defs>
</svg>