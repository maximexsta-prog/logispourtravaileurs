<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="wall-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4BAA8"/>
      <stop offset="60%" stop-color="#D0C8B4"/>
      <stop offset="100%" stop-color="#D8D0C0"/>
    </linearGradient>
    <linearGradient id="floor-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0845C"/>
      <stop offset="100%" stop-color="#886040"/>
    </linearGradient>
    <linearGradient id="win-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88A8C0"/>
      <stop offset="100%" stop-color="#B0CCCA"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1E3A2F"/>
    </radialGradient>
  </defs>

  <!-- Wall with gradient -->
  <rect width="1200" height="420" fill="url(#wall-h)"/>
  <!-- Subtle dado rail -->
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#B8B0A0" stroke-width="1.5" opacity="0.35"/>
  <!-- Floor -->
  <rect x="0" y="420" width="1200" height="180" fill="url(#floor-h)"/>
  <!-- Floor planks -->
  <line x1="0" y1="440" x2="1200" y2="440" stroke="#8B7048" stroke-width="1.5" opacity="0.38"/>
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#8B7048" stroke-width="1.5" opacity="0.32"/>
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#8B7048" stroke-width="1.5" opacity="0.27"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#8B7048" stroke-width="1.2" opacity="0.22"/>
  <line x1="0" y1="522" x2="1200" y2="522" stroke="#8B7048" stroke-width="1" opacity="0.18"/>
  <line x1="200" y1="420" x2="200" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.24"/>
  <line x1="500" y1="420" x2="500" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.24"/>
  <line x1="800" y1="420" x2="800" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.24"/>
  <line x1="1050" y1="420" x2="1050" y2="600" stroke="#8B7048" stroke-width="1" opacity="0.24"/>

  <!-- Left window with sky gradient -->
  <rect x="80" y="58" width="200" height="284" fill="url(#win-h)" rx="4"/>
  <rect x="80" y="58" width="200" height="284" fill="none" stroke="#8A7A60" stroke-width="6" rx="4"/>
  <line x1="180" y1="58" x2="180" y2="342" stroke="#8A7A60" stroke-width="4"/>
  <line x1="80" y1="200" x2="280" y2="200" stroke="#8A7A60" stroke-width="4"/>
  <!-- Window reflection -->
  <line x1="88" y1="66" x2="108" y2="96" stroke="white" stroke-width="4" opacity="0.22" stroke-linecap="round"/>
  <!-- Window sill -->
  <rect x="74" y="338" width="212" height="10" rx="3" fill="#C8B898"/>
  <!-- Window light on floor -->
  <path d="M80 420 L280 420 L320 600 L20 600 Z" fill="#F0E8C0" opacity="0.05"/>
  <!-- Left curtain -->
  <path d="M60 48 Q80 150 70 342 L80 342 L80 58 Z" fill="#8B9E7A" opacity="0.82"/>
  <path d="M280 48 Q260 150 270 342 L280 342 L280 58 Z" fill="#8B9E7A" opacity="0.82"/>

  <!-- Bed shadow on floor -->
  <ellipse cx="590" cy="440" rx="260" ry="12" fill="#1E3A2F" opacity="0.08"/>

  <!-- Bed headboard -->
  <rect x="340" y="218" width="500" height="82" rx="10" fill="#5C4A35"/>
  <rect x="344" y="221" width="492" height="12" rx="5" fill="#7A6248" opacity="0.3"/>

  <!-- Bed base -->
  <rect x="350" y="278" width="480" height="162" rx="8" fill="#E8DDD0"/>

  <!-- Pillow 1 -->
  <rect x="370" y="268" width="180" height="82" rx="12" fill="#F5F0E8"/>
  <rect x="370" y="268" width="180" height="82" fill="none" stroke="#D4C8B8" stroke-width="1.5" rx="12"/>
  <circle cx="460" cy="309" r="5" fill="#D4C8B8" opacity="0.55"/>
  <!-- Pillow 2 -->
  <rect x="570" y="268" width="180" height="82" rx="12" fill="#F5F0E8"/>
  <rect x="570" y="268" width="180" height="82" fill="none" stroke="#D4C8B8" stroke-width="1.5" rx="12"/>
  <circle cx="660" cy="309" r="5" fill="#D4C8B8" opacity="0.55"/>

  <!-- Duvet -->
  <rect x="350" y="328" width="480" height="112" rx="8" fill="#EAE0D0"/>
  <line x1="350" y1="352" x2="830" y2="352" stroke="#D4C8B8" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="372" x2="830" y2="372" stroke="#D4C8B8" stroke-width="1" opacity="0.32"/>

  <!-- Bed legs -->
  <rect x="360" y="428" width="16" height="30" rx="4" fill="#4A3828"/>
  <rect x="800" y="428" width="16" height="30" rx="4" fill="#4A3828"/>

  <!-- Nightstand left -->
  <rect x="258" y="338" width="82" height="90" rx="6" fill="#6B5240"/>
  <line x1="258" y1="362" x2="340" y2="362" stroke="#5A4232" stroke-width="1.5"/>
  <circle cx="299" cy="374" r="3" fill="#8A7050" opacity="0.7"/>
  <rect x="258" y="338" width="82" height="6" rx="2" fill="#7A6050" opacity="0.35"/>

  <!-- Lamp left (trapezoid shade) -->
  <rect x="295" y="306" width="4" height="36" fill="#8A7A60"/>
  <path d="M278 306 L318 306 L312 322 L284 322 Z" fill="#F0E0B0" opacity="0.92"/>
  <path d="M278 306 L318 306 L312 322 L284 322 Z" fill="none" stroke="#C8A870" stroke-width="2"/>
  <ellipse cx="299" cy="338" rx="28" ry="6" fill="#F8E880" opacity="0.15"/>

  <!-- Nightstand right -->
  <rect x="840" y="338" width="82" height="90" rx="6" fill="#6B5240"/>
  <line x1="840" y1="362" x2="922" y2="362" stroke="#5A4232" stroke-width="1.5"/>
  <circle cx="881" cy="374" r="3" fill="#8A7050" opacity="0.7"/>
  <rect x="840" y="338" width="82" height="6" rx="2" fill="#7A6050" opacity="0.35"/>

  <!-- Plant right — leaf paths -->
  <rect x="898" y="292" width="22" height="60" rx="4" fill="#6B5240"/>
  <rect x="894" y="348" width="30" height="8" rx="3" fill="#5A4232"/>
  <path d="M909 292 Q882 260 886 228 Q902 252 909 216 Q916 252 934 230 Q930 262 909 292Z" fill="#4E7A3C"/>
  <path d="M909 280 Q886 250 890 222 Q904 244 909 210 Q914 244 928 224 Q926 254 909 280Z" fill="#5A8A46" opacity="0.85"/>
  <path d="M909 268 Q890 242 894 216 Q906 236 909 206 Q912 236 922 218 Q920 244 909 268Z" fill="#6A9A54" opacity="0.72"/>
  <path d="M906 255 Q876 238 858 220 Q876 228 880 214 Q886 230 906 255Z" fill="#4E7A3C" opacity="0.68"/>

  <!-- Right window with sky gradient -->
  <rect x="920" y="58" width="200" height="284" fill="url(#win-h)" rx="4"/>
  <rect x="920" y="58" width="200" height="284" fill="none" stroke="#8A7A60" stroke-width="6" rx="4"/>
  <line x1="1020" y1="58" x2="1020" y2="342" stroke="#8A7A60" stroke-width="4"/>
  <line x1="920" y1="200" x2="1120" y2="200" stroke="#8A7A60" stroke-width="4"/>
  <line x1="928" y1="66" x2="948" y2="96" stroke="white" stroke-width="4" opacity="0.22" stroke-linecap="round"/>
  <rect x="914" y="338" width="212" height="10" rx="3" fill="#C8B898"/>
  <!-- Right curtains -->
  <path d="M900 48 Q920 150 910 342 L920 342 L920 58 Z" fill="#8B9E7A" opacity="0.82"/>
  <path d="M1120 48 Q1100 150 1110 342 L1120 342 L1120 58 Z" fill="#8B9E7A" opacity="0.82"/>

  <!-- Rug -->
  <ellipse cx="590" cy="446" rx="240" ry="38" fill="#C4786A" opacity="0.42"/>
  <ellipse cx="590" cy="446" rx="220" ry="32" fill="none" stroke="#B06858" stroke-width="2" opacity="0.3"/>

  <!-- Vignette overlay -->
  <rect width="1200" height="600" fill="url(#vignette)" opacity="0.35"/>
</svg>
