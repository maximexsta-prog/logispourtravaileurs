<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#E8E0D4"/>
  <!-- Floor -->
  <rect x="0" y="185" width="400" height="65" fill="#B8956A"/>
  <line x1="0" y1="198" x2="400" y2="198" stroke="#A07850" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="215" x2="400" y2="215" stroke="#A07850" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="185" x2="130" y2="250" stroke="#A07850" stroke-width="1" opacity="0.35"/>
  <line x1="280" y1="185" x2="280" y2="250" stroke="#A07850" stroke-width="1" opacity="0.35"/>
  <!-- Bed headboard -->
  <rect x="60" y="100" width="280" height="50" rx="8" fill="#5C4A35"/>
  <!-- Bed base -->
  <rect x="60" y="145" width="280" height="60" rx="6" fill="#D4C8B8"/>
  <!-- Pillows -->
  <rect x="72" y="138" width="110" height="50" rx="10" fill="#F5F0E8"/>
  <rect x="72" y="138" width="110" height="50" rx="10" fill="none" stroke="#D4C8B8" stroke-width="1.5"/>
  <rect x="218" y="138" width="110" height="50" rx="10" fill="#F5F0E8"/>
  <rect x="218" y="138" width="110" height="50" rx="10" fill="none" stroke="#D4C8B8" stroke-width="1.5"/>
  <!-- Duvet -->
  <rect x="60" y="168" width="280" height="46" rx="6" fill="#EAE0D0"/>
  <line x1="60" y1="182" x2="340" y2="182" stroke="#D4C8B8" stroke-width="1.5" opacity="0.6"/>
  <!-- Bed legs -->
  <rect x="68" y="198" width="10" height="18" rx="3" fill="#4A3828"/>
  <rect x="320" y="198" width="10" height="18" rx="3" fill="#4A3828"/>
  <!-- Nightstand -->
  <rect x="10" y="145" width="44" height="55" rx="5" fill="#6B5240"/>
  <rect x="15" y="158" width="34" height="22" rx="3" fill="#5A4232"/>
  <!-- Lamp -->
  <rect x="28" y="122" width="3" height="26" fill="#8A7A60"/>
  <ellipse cx="29" cy="121" rx="16" ry="10" fill="#F0E0B0" opacity="0.9"/>
  <!-- Window -->
  <rect x="295" y="20" width="90" height="110" fill="#A8C4B8" rx="3"/>
  <rect x="295" y="20" width="90" height="110" fill="none" stroke="#8A7A60" stroke-width="3" rx="3"/>
  <line x1="340" y1="20" x2="340" y2="130" stroke="#8A7A60" stroke-width="2"/>
  <line x1="295" y1="75" x2="385" y2="75" stroke="#8A7A60" stroke-width="2"/>
  <!-- Small plant -->
  <rect x="22" y="108" width="10" height="20" rx="3" fill="#7A6248"/>
  <ellipse cx="18" cy="96" rx="14" ry="16" fill="#5A8A46"/>
  <ellipse cx="30" cy="92" rx="11" ry="13" fill="#4E7A3C"/>
  <!-- Wall color accent -->
  <rect x="0" y="0" width="400" height="100" fill="#D8D0C4"/>
</svg>