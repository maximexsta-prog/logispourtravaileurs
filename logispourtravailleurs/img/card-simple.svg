<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="wall-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CEC6B4"/>
      <stop offset="55%" stop-color="#DDD6C8"/>
      <stop offset="100%" stop-color="#EAE4DA"/>
    </linearGradient>
    <linearGradient id="floor-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A878"/>
      <stop offset="100%" stop-color="#A48858"/>
    </linearGradient>
    <linearGradient id="win-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AAEC8"/>
      <stop offset="100%" stop-color="#B8D0C8"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="400" height="190" fill="url(#wall-s)"/>
  <!-- Floor -->
  <rect x="0" y="190" width="400" height="60" fill="url(#floor-s)"/>
  <line x1="0" y1="202" x2="400" y2="202" stroke="#A48858" stroke-width="1" opacity="0.45"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#A48858" stroke-width="1" opacity="0.35"/>

  <!-- Window with sky gradient + outdoor hint -->
  <rect x="268" y="18" width="114" height="154" rx="4" fill="url(#win-s)"/>
  <rect x="268" y="18" width="114" height="154" fill="none" stroke="#8A7A60" stroke-width="4" rx="4"/>
  <line x1="325" y1="18" x2="325" y2="172" stroke="#8A7A60" stroke-width="2.5"/>
  <line x1="268" y1="95" x2="382" y2="95" stroke="#8A7A60" stroke-width="2.5"/>
  <!-- Outdoor tree silhouette seen through glass -->
  <ellipse cx="302" cy="60" rx="17" ry="21" fill="#4E7A3C" opacity="0.28"/>
  <ellipse cx="302" cy="46" rx="13" ry="16" fill="#5A8A46" opacity="0.22"/>
  <!-- Reflection line -->
  <line x1="276" y1="24" x2="290" y2="44" stroke="white" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Window sill -->
  <rect x="264" y="169" width="122" height="6" rx="2" fill="#C8B898"/>
  <!-- Window light on floor -->
  <path d="M268 190 L382 190 L400 250 L246 250 Z" fill="#F0E8C8" opacity="0.07"/>

  <!-- Bookshelf brackets -->
  <rect x="28" y="68" width="8" height="50" rx="2" fill="#6A5442" opacity="0.45"/>
  <rect x="152" y="68" width="8" height="50" rx="2" fill="#6A5442" opacity="0.45"/>
  <!-- Shelf board -->
  <rect x="28" y="62" width="136" height="8" rx="3" fill="#7A6450"/>
  <!-- Books — varied heights and brand-friendly colors -->
  <rect x="36" y="38" width="16" height="26" rx="2" fill="#E8602A" opacity="0.88"/>
  <line x1="42" y1="38" x2="42" y2="64" stroke="#C84A1A" stroke-width="1" opacity="0.4"/>
  <rect x="56" y="35" width="12" height="29" rx="2" fill="#1E3A2F" opacity="0.88"/>
  <rect x="72" y="40" width="14" height="24" rx="2" fill="#8B9E7A" opacity="0.88"/>
  <rect x="90" y="34" width="10" height="30" rx="2" fill="#C8A870" opacity="0.88"/>
  <rect x="104" y="38" width="13" height="26" rx="2" fill="#7A5A48" opacity="0.85"/>
  <rect x="121" y="41" width="11" height="23" rx="2" fill="#5A7A8A" opacity="0.8"/>
  <rect x="136" y="36" width="8" height="28" rx="2" fill="#A87848" opacity="0.8"/>
  <!-- Plant on shelf end -->
  <rect x="154" y="48" width="10" height="16" rx="3" fill="#7A6248"/>
  <path d="M159 48 Q146 36 148 22 Q156 32 159 20 Q162 32 172 24 Q172 38 159 48Z" fill="#5A8A46"/>
  <path d="M159 42 Q150 30 153 18 Q158 28 159 14 Q162 26 166 18 Q167 32 159 42Z" fill="#4E7A3C" opacity="0.85"/>

  <!-- Desk shadow -->
  <ellipse cx="125" cy="196" rx="100" ry="5" fill="#3A2010" opacity="0.1"/>

  <!-- Desk -->
  <rect x="28" y="130" width="196" height="12" rx="3" fill="#7A6450"/>
  <rect x="28" y="138" width="196" height="5" fill="#4A3828" opacity="0.1" rx="1"/>
  <rect x="36" y="142" width="8" height="50" rx="3" fill="#6A5442"/>
  <rect x="200" y="142" width="8" height="50" rx="3" fill="#6A5442"/>
  <!-- Desk mat -->
  <rect x="44" y="125" width="118" height="8" rx="2" fill="#8A7460" opacity="0.45"/>

  <!-- Chair -->
  <rect x="78" y="150" width="72" height="42" rx="6" fill="#8B9E7A"/>
  <rect x="78" y="140" width="72" height="18" rx="4" fill="#7A8E6A"/>
  <rect x="76" y="152" width="8" height="8" rx="2" fill="#6A7E5A"/>
  <rect x="140" y="152" width="8" height="8" rx="2" fill="#6A7E5A"/>
  <rect x="84" y="190" width="6" height="22" rx="2" fill="#5A4A35"/>
  <rect x="138" y="190" width="6" height="22" rx="2" fill="#5A4A35"/>

  <!-- Laptop -->
  <rect x="98" y="113" width="74" height="19" rx="2" fill="#4A4A4A"/>
  <rect x="103" y="116" width="64" height="14" rx="1" fill="#2A3A3A"/>
  <!-- Screen subtle blue glow (working) -->
  <rect x="103" y="116" width="64" height="14" rx="1" fill="#7BAAB8" opacity="0.18"/>
  <rect x="93" y="130" width="84" height="6" rx="2" fill="#3A3A3A"/>

  <!-- Desk lamp -->
  <rect x="186" y="96" width="4" height="38" fill="#8A7A60"/>
  <path d="M190 96 Q208 84 218 92" stroke="#8A7A60" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Lamp shade -->
  <path d="M208 88 L230 88 L226 100 L212 100 Z" fill="#F0E0B0" opacity="0.9"/>
  <path d="M208 88 L230 88 L226 100 L212 100 Z" fill="none" stroke="#C8A870" stroke-width="1.5"/>
  <!-- Lamp glow on desk -->
  <ellipse cx="218" cy="130" rx="24" ry="8" fill="#F8E880" opacity="0.14"/>
</svg>
